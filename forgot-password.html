<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Forgot Password | Your App</title>
</head>
<body>

    <div class="container" id="container">
        <!-- We only show one form here - no sliding panels needed -->
        <div class="form-container sign-in" style="position: static; transform: none; opacity: 1; width: 100%; left: 0;">
            <form id="forgotForm">
                <h1>Forgot Password</h1>
                <span>Enter your email to receive a reset link</span>
                <input type="email" placeholder="Email" required>
                <button type="submit">Send Reset Link</button>
                <a href="index.html" style="margin-top: 20px;">Back to Login</a>
            </form>
        </div>

        <!-- Optional: keep toggle container empty or minimal -->
        <div class="toggle-container" style="opacity: 0; visibility: hidden;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
